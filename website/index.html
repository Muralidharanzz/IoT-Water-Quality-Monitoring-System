<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSense - IoT Water Quality Monitoring</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <div class="auth-container">
        <div class="glass-card auth-box">
            <div class="text-center mb-4">
                <i class="bi bi-droplet-half text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-3 fw-bold">AquaSense</h2>
                <p class="text-muted">Community Water Quality Monitoring</p>
            </div>
            
            <div id="error-message" class="alert alert-danger d-none"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label text-muted">Email address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="login-btn">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4 text-muted" style="font-size: 0.9rem;">
                <p>Protected by Firebase Authentication</p>
            </div>
        </div>
    </div>

    <!-- Auth Logic -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
