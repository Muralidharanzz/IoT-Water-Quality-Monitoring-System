<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSense - Community Water Quality Monitoring</title>
    <meta name="description"
        content="IoT-based community water quality monitoring system. Real-time pH, TDS, Turbidity, and Temperature tracking.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box glass-card">
            <!-- Header -->
            <div class="text-center mb-4">
                <i class="bi bi-droplet-half text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">AquaSense</h2>
                <p class="text-muted">Community Water Quality Monitor</p>
            </div>

            <!-- Tab Navigation -->
            <ul class="nav nav-pills nav-fill mb-4 gap-2" id="auth-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active glass-card border-0 text-white py-2" id="login-tab"
                        data-bs-toggle="pill" data-bs-target="#login-panel" type="button" role="tab"
                        aria-controls="login-panel" aria-selected="true">Sign In</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link glass-card border-0 text-white py-2" id="register-tab" data-bs-toggle="pill"
                        data-bs-target="#register-panel" type="button" role="tab" aria-controls="register-panel"
                        aria-selected="false">Register</button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="auth-tab-content">

                <!-- Login Panel -->
                <div class="tab-pane fade show active" id="login-panel" role="tabpanel" aria-labelledby="login-tab">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="login-email" placeholder="you@example.com"
                                required>
                        </div>
                        <div class="mb-4">
                            <label for="login-password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="login-password" placeholder="Enter password"
                                required>
                        </div>
                        <div id="login-error" class="alert alert-danger d-none small py-2"></div>
                        <button type="submit" class="btn btn-primary w-100" id="login-btn">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" id="forgot-password-link" class="text-muted text-decoration-none small">
                            <i class="bi bi-key me-1"></i>Forgot Password?
                        </a>
                    </div>
                    <div id="reset-section" class="d-none mt-3">
                        <hr style="border-color: var(--glass-border);">
                        <div class="mb-3">
                            <label for="reset-email" class="form-label small">Enter your email to reset</label>
                            <input type="email" class="form-control" id="reset-email" placeholder="you@example.com">
                        </div>
                        <div id="reset-error" class="alert alert-danger d-none small py-2"></div>
                        <div id="reset-success" class="alert alert-success d-none small py-2"></div>
                        <button type="button" class="btn btn-outline-light btn-sm w-100" id="reset-btn">
                            <i class="bi bi-envelope me-1"></i>Send Reset Email
                        </button>
                    </div>
                </div>

                <!-- Register Panel -->
                <div class="tab-pane fade" id="register-panel" role="tabpanel" aria-labelledby="register-tab">
                    <form id="register-form">
                        <div class="mb-3">
                            <label for="reg-name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="reg-name" placeholder="Your full name" required>
                        </div>
                        <div class="mb-3">
                            <label for="reg-email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="reg-email" placeholder="you@example.com"
                                required>
                        </div>
                        <div class="mb-4">
                            <label for="reg-password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="reg-password"
                                placeholder="Min. 6 characters" required minlength="6">
                        </div>
                        <div id="register-error" class="alert alert-danger d-none small py-2"></div>
                        <div id="register-success" class="alert alert-success d-none small py-2"></div>
                        <button type="submit" class="btn btn-primary w-100" id="register-btn">
                            <i class="bi bi-person-plus me-2"></i>Create Account
                        </button>
                    </form>
                </div>

            </div>

            <div class="text-center mt-4">
                <small class="text-muted">Powered by IoT & Firebase</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
