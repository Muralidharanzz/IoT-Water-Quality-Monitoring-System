<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AquaSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom glass-card rounded-0 mb-0"
        style="border-color: var(--glass-border) !important;">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <i class="bi bi-droplet-half text-primary me-2 fs-3"></i>
                AquaSense
            </a>
            <div class="d-flex align-items-center ms-auto gap-2">
                <a href="#" id="back-btn" class="btn btn-outline-light btn-sm"
                    style="border-color: var(--glass-border);">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="auth-container" style="min-height: calc(100vh - 56px);">
        <div class="glass-card auth-box" style="max-width: 550px;">
            <!-- Profile Header -->
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                    style="width:80px; height:80px; background: linear-gradient(135deg, var(--primary), var(--secondary));">
                    <i class="bi bi-person-fill fs-1 text-white"></i>
                </div>
                <h3 class="fw-bold mb-1" id="profile-name">Loading...</h3>
                <span class="status-badge status-safe" id="profile-role">--</span>
            </div>

            <!-- Profile Info -->
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center p-3 rounded mb-2"
                    style="background: rgba(15,23,42,0.5); border:1px solid var(--glass-border); border-radius:10px;">
                    <div>
                        <small class="text-muted d-block">Email</small>
                        <span id="profile-email" style="color: var(--text-main);">--</span>
                    </div>
                    <i class="bi bi-envelope text-primary"></i>
                </div>
                <div class="d-flex justify-content-between align-items-center p-3 rounded mb-2"
                    style="background: rgba(15,23,42,0.5); border:1px solid var(--glass-border); border-radius:10px;">
                    <div>
                        <small class="text-muted d-block">Account Status</small>
                        <span id="profile-status" style="color: var(--success);">--</span>
                    </div>
                    <i class="bi bi-shield-check text-success"></i>
                </div>
                <div class="d-flex justify-content-between align-items-center p-3 rounded mb-2"
                    style="background: rgba(15,23,42,0.5); border:1px solid var(--glass-border); border-radius:10px;">
                    <div>
                        <small class="text-muted d-block">Member Since</small>
                        <span id="profile-joined" style="color: var(--text-main);">--</span>
                    </div>
                    <i class="bi bi-calendar text-primary"></i>
                </div>
            </div>

            <!-- Edit Name -->
            <div class="mb-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-pencil-square me-2 text-primary"></i>Update Display Name</h6>
                <div class="input-group">
                    <input type="text" class="form-control" id="edit-name" placeholder="New display name">
                    <button class="btn btn-primary" id="save-name-btn" type="button">
                        <i class="bi bi-check-lg"></i> Save
                    </button>
                </div>
                <div id="name-msg" class="mt-2 small"></div>
            </div>

            <!-- Change Password -->
            <div class="mb-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-key me-2 text-warning"></i>Change Password</h6>
                <input type="password" class="form-control mb-2" id="new-password"
                    placeholder="New password (min 6 chars)">
                <input type="password" class="form-control mb-2" id="confirm-password"
                    placeholder="Confirm new password">
                <button class="btn btn-outline-light w-100" id="change-password-btn"
                    style="border-color: var(--glass-border);">
                    <i class="bi bi-shield-lock me-2"></i>Update Password
                </button>
                <div id="password-msg" class="mt-2 small"></div>
            </div>

            <!-- Logout -->
            <button class="btn btn-outline-danger w-100" id="logout-btn">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
        </div>
    </div>

    <script type="module" src="js/profile.js"></script>
</body>

</html>
